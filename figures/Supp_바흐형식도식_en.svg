<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 250" width="1080" height="250"><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');text{fill:#1A1A1A;font-family:'Noto Serif KR','Source Serif 4',serif}.mono{font-family:'IBM Plex Mono',monospace}.serif{font-family:'Noto Serif KR','Source Serif 4',serif}</style><rect x="0" y="0" width="1080" height="250" fill="#FFFFFF"/><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,1 L7,4.5 L0,8 Z" fill="#1A1A1A"/></marker></defs><text x="190" y="40" text-anchor="middle" font-size="14" fill="#1A1A1A" class="serif" font-weight="600">Crab Canon — retrograde</text><text x="190" y="60" text-anchor="middle" font-size="11" fill="#555555" class="serif" font-style="italic">forward = backward (time symmetry)</text><line x1="50" y1="72" x2="330" y2="72" stroke="#C8C8C8" stroke-width="0.8"/><line x1="50" y1="138" x2="330" y2="138" stroke="#C8C8C8" stroke-width="1"/><line x1="50" y1="150" x2="330" y2="150" stroke="#C8C8C8" stroke-width="1"/><line x1="50" y1="162" x2="330" y2="162" stroke="#C8C8C8" stroke-width="1"/><line x1="50" y1="174" x2="330" y2="174" stroke="#C8C8C8" stroke-width="1"/><line x1="50" y1="186" x2="330" y2="186" stroke="#C8C8C8" stroke-width="1"/><line x1="190" y1="120" x2="190" y2="204" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3"/><ellipse cx="90" cy="186" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="290" cy="186" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="120" cy="174" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="260" cy="174" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="150" cy="162" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="230" cy="162" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="178" cy="150" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="202" cy="150" rx="6.5" ry="4.8" fill="#1A1A1A"/><text x="115" y="112" text-anchor="middle" font-size="10.5" fill="#888888" class="serif">forward</text><text x="265" y="112" text-anchor="middle" font-size="10.5" fill="#888888" class="serif">retrograde</text><text x="190" y="222" text-anchor="middle" font-size="14" fill="#555555" class="serif">↔</text><text x="560" y="40" text-anchor="middle" font-size="14" fill="#1A1A1A" class="serif" font-weight="600">Endlessly Rising Canon</text><text x="560" y="60" text-anchor="middle" font-size="11" fill="#555555" class="serif" font-style="italic">endless rise → start (Shepard)</text><line x1="420" y1="72" x2="700" y2="72" stroke="#C8C8C8" stroke-width="0.8"/><line x1="445" y1="192" x2="665" y2="128" stroke="#1A1A1A" stroke-width="1"/><ellipse cx="445" cy="192" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="500" cy="176" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="555" cy="160" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="610" cy="144" rx="6.5" ry="4.8" fill="#1A1A1A"/><ellipse cx="665" cy="128" rx="6.5" ry="4.8" fill="#1A1A1A"/><path d="M 665 120 C 710 86, 420 86, 440 184" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ar)"/><text x="640" y="116" text-anchor="middle" font-size="10.5" fill="#888888" class="serif">rising</text><text x="560" y="100" text-anchor="middle" font-size="10.5" fill="#888888" class="serif">returns</text><text x="560" y="222" text-anchor="middle" font-size="11" fill="#555555" class="mono">+1 oct ↺</text><text x="930" y="40" text-anchor="middle" font-size="14" fill="#1A1A1A" class="serif" font-weight="600">B–A–C–H motif</text><text x="930" y="60" text-anchor="middle" font-size="11" fill="#555555" class="serif" font-style="italic">the composer's name as pitch</text><line x1="790" y1="72" x2="1070" y2="72" stroke="#C8C8C8" stroke-width="0.8"/><line x1="790" y1="138" x2="1070" y2="138" stroke="#C8C8C8" stroke-width="1"/><line x1="790" y1="150" x2="1070" y2="150" stroke="#C8C8C8" stroke-width="1"/><line x1="790" y1="162" x2="1070" y2="162" stroke="#C8C8C8" stroke-width="1"/><line x1="790" y1="174" x2="1070" y2="174" stroke="#C8C8C8" stroke-width="1"/><line x1="790" y1="186" x2="1070" y2="186" stroke="#C8C8C8" stroke-width="1"/><ellipse cx="840" cy="174" rx="6.5" ry="4.8" fill="#1A1A1A"/><text x="840" y="214" text-anchor="middle" font-size="13" fill="#1A1A1A" class="mono">B♭</text><ellipse cx="900" cy="180" rx="6.5" ry="4.8" fill="#1A1A1A"/><text x="900" y="214" text-anchor="middle" font-size="13" fill="#1A1A1A" class="mono">A</text><ellipse cx="960" cy="150" rx="6.5" ry="4.8" fill="#1A1A1A"/><text x="960" y="214" text-anchor="middle" font-size="13" fill="#1A1A1A" class="mono">C</text><ellipse cx="1018" cy="162" rx="6.5" ry="4.8" fill="#1A1A1A"/><text x="1018" y="214" text-anchor="middle" font-size="13" fill="#1A1A1A" class="mono">H</text><text x="930" y="234" text-anchor="middle" font-size="11" fill="#555555" class="mono">B–A–C–H</text></svg>