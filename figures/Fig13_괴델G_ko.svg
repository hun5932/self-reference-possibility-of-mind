<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660"><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');text{fill:#1A1A1A;font-family:'Noto Serif KR','Source Serif 4',serif}.mono{font-family:'IBM Plex Mono',monospace}.serif{font-family:'Noto Serif KR','Source Serif 4',serif}</style><rect x="0" y="0" width="1000" height="660" fill="#FFFFFF"/><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,1 L7,4.5 L0,8 Z" fill="#1A1A1A"/></marker></defs><text x="272" y="88" text-anchor="end" font-size="12" fill="#888888" class="serif">환원</text><text x="272" y="311" text-anchor="end" font-size="12" fill="#888888" class="serif">자기참조</text><text x="272" y="550" text-anchor="end" font-size="12" fill="#888888" class="serif">창발</text><rect x="300" y="36" width="440" height="104" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.1"/><text x="520" y="68" text-anchor="middle" font-size="15.5" fill="#1A1A1A" class="serif" font-weight="600">형식 체계 P · Principia Mathematica</text><text x="520" y="94" text-anchor="middle" font-size="12.5" fill="#555555" class="serif">공리(axioms) + 추론규칙(inference rules)</text><text x="520" y="122" text-anchor="middle" font-size="13" fill="#1A1A1A" class="mono">증명가능성 술어  Prov(x) · ⊢</text><line x1="520" y1="140" x2="520" y2="232" stroke="#1A1A1A" stroke-width="1.1" marker-end="url(#ar)"/><text x="538" y="172" text-anchor="start" font-size="12.5" fill="#1A1A1A" class="serif">산술화 · arithmetization</text><text x="538" y="192" text-anchor="start" font-size="12" fill="#555555" class="mono">g : 기호열 → ℕ</text><rect x="300" y="236" width="440" height="150" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.1"/><text x="520" y="274" text-anchor="middle" font-size="22" fill="#1A1A1A" class="mono" font-weight="600">⌜G⌝</text><text x="520" y="312" text-anchor="middle" font-size="14" fill="#1A1A1A" class="serif">G ≡ “이 명제는 P 안에서 증명 불가능하다”</text><text x="520" y="348" text-anchor="middle" font-size="15" fill="#1A1A1A" class="mono">G ⟺ ¬Prov(⌜G⌝)</text><path d="M 740 280 H 800 V 342 H 740" fill="none" stroke="#1A1A1A" stroke-width="1.1" marker-end="url(#ar)"/><text x="812" y="306" text-anchor="start" font-size="12.5" fill="#1A1A1A" class="mono">sub(13, 17, 13)</text><text x="812" y="326" text-anchor="start" font-size="11.5" fill="#555555" class="serif">G가 자신의 괴델수를 지시</text><line x1="520" y1="386" x2="520" y2="478" stroke="#1A1A1A" stroke-width="1.1" marker-end="url(#ar)"/><rect x="300" y="482" width="440" height="128" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.3"/><text x="520" y="512" text-anchor="middle" font-size="15.5" fill="#1A1A1A" class="serif" font-weight="700">메타-진리 · Meta-Truth</text><text x="520" y="540" text-anchor="middle" font-size="14" fill="#1A1A1A" class="serif">G는 참이다 — 그러나 P에서 증명 불가</text><text x="520" y="570" text-anchor="middle" font-size="14.5" fill="#1A1A1A" class="mono">True(G) ∧ ¬Prov(⌜G⌝)  ⟹  P는 불완전</text><text x="520" y="594" text-anchor="middle" font-size="12" fill="#555555" class="serif" font-style="italic">제1 불완전성 정리</text></svg>